<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge Française Personnalisable</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
            transform-origin: top;
        }

        .controls.hidden {
            opacity: 0;
            transform: scaleY(0);
            height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .controls h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .control-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        input[type="color"] {
            width: 100%;
            height: 45px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        input[type="color"]:hover {
            border-color: #667eea;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:hover, input[type="range"]:hover {
            border-color: #667eea;
        }

        input[type="range"] {
            padding: 5px;
        }

        .size-display {
            display: inline-block;
            margin-left: 10px;
            color: #667eea;
            font-weight: bold;
        }

        .menu-icon {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .menu-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .menu-icon span {
            width: 20px;
            height: 2.5px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Quand le panneau est OUVERT (pas hidden), on voit la CROIX */
        .menu-icon:not(.hidden) span:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 5px);
        }

        .menu-icon:not(.hidden) span:nth-child(2) {
            opacity: 0;
        }

        .menu-icon:not(.hidden) span:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -5px);
        }

        .clock-container {
            position: relative;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: white;
            transition: all 0.3s ease;
        }

        .date {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 10px;
            text-transform: capitalize;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .day {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
        }

        .time {
            font-size: 72px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 5px;
            transition: all 0.3s ease;
        }

        .seconds {
            font-size: 48px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .clock-container {
                padding: 30px 40px;
            }
            
            .control-row {
                grid-template-columns: 1fr;
            }

            .menu-icon {
                bottom: 15px;
                left: 15px;
                width: 35px;
                height: 35px;
            }

            .menu-icon span {
                width: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls" id="controls">
            <h2>🎨 Personnalisation de l'horloge</h2>
            
            <div class="control-group">
                <label>Couleur du texte</label>
                <input type="color" id="textColor" value="#ffffff">
            </div>

            <div class="control-group">
                <label>Couleur de la boîte</label>
                <input type="color" id="boxColor" value="#ffffff">
            </div>

            <div class="control-group">
                <label>Transparence de la boîte</label>
                <input type="range" id="boxOpacity" min="0" max="100" value="10">
                <span class="size-display" id="opacityValue">10%</span>
            </div>

            <div class="control-group">
                <label>Police de caractères</label>
                <select id="fontFamily">
                    <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Segoe UI (par défaut)</option>
                    <option value="'Arial', sans-serif">Arial</option>
                    <option value="'Helvetica', sans-serif">Helvetica</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Georgia', serif">Georgia</option>
                    <option value="'Courier New', monospace">Courier New</option>
                    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                    <option value="'Verdana', sans-serif">Verdana</option>
                    <option value="'Impact', sans-serif">Impact</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
                </select>
            </div>

            <div class="control-group">
                <label>Taille de l'heure</label>
                <input type="range" id="timeSize" min="30" max="120" value="72">
                <span class="size-display" id="timeSizeValue">72px</span>
            </div>

            <div class="control-group">
                <label>Taille du jour</label>
                <input type="range" id="daySize" min="16" max="60" value="32">
                <span class="size-display" id="daySizeValue">32px</span>
            </div>

            <div class="control-group">
                <label>Taille de la date</label>
                <input type="range" id="dateSize" min="12" max="40" value="24">
                <span class="size-display" id="dateSizeValue">24px</span>
            </div>
        </div>

        <div class="clock-container" id="clockContainer">
            <div class="menu-icon" id="menuIcon" onclick="toggleControls()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="day" id="day"></div>
            <div class="date" id="date"></div>
            <div class="time">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span class="seconds" id="seconds">00</span>
            </div>
        </div>
    </div>

    <script>
        const jours = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
        const mois = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];

        function updateClock() {
            const maintenant = new Date();
            
            const jour = jours[maintenant.getDay()];
            document.getElementById('day').textContent = jour;
            
            const dateJour = maintenant.getDate();
            const moisNom = mois[maintenant.getMonth()];
            const annee = maintenant.getFullYear();
            document.getElementById('date').textContent = `${dateJour} ${moisNom} ${annee}`;
            
            const heures = String(maintenant.getHours()).padStart(2, '0');
            const minutes = String(maintenant.getMinutes()).padStart(2, '0');
            const secondes = String(maintenant.getSeconds()).padStart(2, '0');
            
            document.getElementById('hours').textContent = heures;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = secondes;
        }

        // Fonction pour convertir hex en rgba
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Gestion des changements de couleurs
        document.getElementById('textColor').addEventListener('input', (e) => {
            document.getElementById('clockContainer').style.color = e.target.value;
        });

        document.getElementById('boxColor').addEventListener('input', (e) => {
            const opacity = document.getElementById('boxOpacity').value / 100;
            document.getElementById('clockContainer').style.background = hexToRgba(e.target.value, opacity);
        });

        document.getElementById('boxOpacity').addEventListener('input', (e) => {
            const color = document.getElementById('boxColor').value;
            const opacity = e.target.value / 100;
            document.getElementById('clockContainer').style.background = hexToRgba(color, opacity);
            document.getElementById('opacityValue').textContent = `${e.target.value}%`;
        });

        document.getElementById('fontFamily').addEventListener('change', (e) => {
            document.getElementById('clockContainer').style.fontFamily = e.target.value;
        });

        document.getElementById('timeSize').addEventListener('input', (e) => {
            document.querySelector('.time').style.fontSize = `${e.target.value}px`;
            const secondsSize = Math.round(e.target.value * 0.67);
            document.querySelector('.seconds').style.fontSize = `${secondsSize}px`;
            document.getElementById('timeSizeValue').textContent = `${e.target.value}px`;
        });

        document.getElementById('daySize').addEventListener('input', (e) => {
            document.querySelector('.day').style.fontSize = `${e.target.value}px`;
            document.getElementById('daySizeValue').textContent = `${e.target.value}px`;
        });

        document.getElementById('dateSize').addEventListener('input', (e) => {
            document.querySelector('.date').style.fontSize = `${e.target.value}px`;
            document.getElementById('dateSizeValue').textContent = `${e.target.value}px`;
        });

        function toggleControls() {
            const controls = document.getElementById('controls');
            const menuIcon = document.getElementById('menuIcon');
            
            controls.classList.toggle('hidden');
            menuIcon.classList.toggle('hidden');
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
